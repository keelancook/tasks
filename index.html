<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        :root { 
            --rule: rgba(0,0,0,0.12); --text: #1a1a1a; --priority: #991b1b; --line: 52px;
            --paper-today: #ffffff; --paper-next: #efdfb4; --paper-someday: #c7b399; --paper-archive: #c7b399; 
        }
        body { 
            margin: 0; padding: 0; background: #1a1a1a; font-family: 'Nanum Pen Script', cursive; 
            overflow: hidden; height: 100vh; width: 100vw; -webkit-tap-highlight-color: transparent;
        }
        #vp { width: 100%; height: 100vh; position: relative; overflow: hidden; }
        
        .card { 
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; 
            transition: transform 0.25s cubic-bezier(0.2, 1, 0.3, 1); 
            box-sizing: border-box;
        }

        .c-today { background: var(--paper-today); }
        .c-next { background: var(--paper-next); }
        .c-someday { background: var(--paper-someday); }
        .c-archive { background: var(--paper-archive); }

        .hdr { height: 100px; display: flex; align-items: flex-start; justify-content: space-between; padding: 20px 20px 0 20px; box-sizing: border-box; }
        .hdr b { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #000; }
        .hdr span { font-size: 22px; color: rgba(0,0,0,0.5); text-align: right; padding-top: 2px; }

        ul { list-style: none; margin: 0; padding: 0; position: relative; }
        li { 
            height: var(--line); display: flex; align-items: center; 
            padding: 0 15px; 
            position: relative; background: transparent; touch-action: none; box-sizing: border-box; 
        }
        li::after { content: ""; position: absolute; bottom: 0; left: 48px; right: 15px; height: 1px; background-color: var(--rule); }
        
        li.dragging { 
            opacity: 0.8; transform: scale(1.02); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            background: rgba(255,255,255,0.4); z-index: 100; 
        }

        .btn-c { 
            width: 18px; height: 18px; border: 1.2px solid #000; border-radius: 50%; 
            margin-right: 12px; display: flex; align-items: center; justify-content: center; 
            flex-shrink: 0; z-index: 2; background: transparent; position: relative; overflow: hidden;
        }
        .today-list li:nth-child(-n+3) .btn-c { border-color: var(--priority); border-width: 2px; }
        
        .btn-c.s-progress { background: linear-gradient(90deg, #000 50%, transparent 50%); }
        .btn-c.s-done { background: #000; border-color: #000; }
        
        .del-arrow { width: 100%; height: 100%; color: inherit; }

        .inp-wrap { flex: 1; display: flex; align-items: center; min-width: 0; position: relative; height: 100%; }
        input { 
            flex: 1; border: none; font-size: 24px; outline: none; background: transparent; 
            color: var(--text); z-index: 2; font-family: 'Nanum Pen Script', cursive; 
            min-width: 0; padding-top: 4px;
        }
        .done { text-decoration: line-through; color: rgba(0,0,0,0.45); opacity: 0.7; }

        /* Tally/Dot Styling */
        .tally-hit-zone { 
            display: flex; align-items: center; gap: 6px; height: 100%; 
            padding: 0 10px 0 15px; cursor: pointer; z-index: 5;
        }
        .dot { 
            width: 7px; height: 7px; border-radius: 50%; 
            border: 1.2px solid rgba(0,0,0,0.2); transition: all 0.1s;
        }
        .dot.active { 
            background: #000; border-color: #000; 
            transform: scale(1.1);
        }

        .ctrls { display: flex; align-items: center; gap: 8px; color: rgba(0,0,0,0.3); z-index: 2; flex-shrink: 0; font-family: sans-serif; }
        .dots, .hndl { padding: 5px; font-size: 18px; cursor: pointer; user-select: none; }
        .hndl { font-size: 20px; }

        .fin-btn { padding: 8px 18px; background: #fff; color: #000; border: 1px solid rgba(0,0,0,0.4); border-radius: 6px; font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 15px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; }
        
        #menu, #settings-menu { position: fixed; bottom: -100%; left: 0; width: 100%; background: #fff; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); border-radius: 24px 24px 0 0; transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1); z-index: 100; padding-bottom: 40px; font-family: sans-serif; }
        #menu.open, #settings-menu.open { bottom: 0; }
        .m-item { padding: 20px; text-align: center; border-bottom: 1px solid #f5f5f5; color: #111; font-size: 16px; font-weight: 600; cursor: pointer; }
        #ov { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: none; z-index: 90; }

        .arch-item { padding: 12px 20px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; min-height: 64px; }
        .arch-date { flex: 1; font-size: 28px; cursor: pointer; padding: 5px 0; }
        .arch-ctrls { display: flex; align-items: center; gap: 4px; height: 44px; }
        .arch-btn { 
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; user-select: none; border-radius: 50%; border: none; background: transparent;
        }
        .arch-undo { color: #000; opacity: 0.6; }
        .arch-del { color: var(--priority); }
        .arch-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; display: block; }
        .arch-btn:active { background: rgba(0,0,0,0.08); }
        
        .settings-trigger { width: 24px; height: 24px; fill: rgba(0,0,0,0.6); margin-top: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="vp"><div id="card" class="card"></div></div>
    <div id="ov" onclick="closeAll()"></div>
    
    <div id="menu">
        <div id="m-context-title" style="padding:15px; font-size:12px; color:#999; text-transform:uppercase; text-align:center; border-bottom:1px solid #eee;">Options</div>
        <div id="m-options-container"></div>
        <div class="m-item" style="opacity:0.5; font-weight:400;" onclick="closeAll()">Cancel</div>
    </div>

    <div id="settings-menu">
        <div class="m-item" onclick="exportMarkdown()">Export Archive (Markdown)</div>
        <div class="m-item" onclick="exportData()">Backup System (JSON)</div>
        <div class="m-item" onclick="importData()">Restore System (JSON)</div>
        <div class="m-item" style="opacity:0.5; font-weight:400;" onclick="closeAll()">Close</div>
    </div>

    <input type="file" id="fileInput" style="display:none" accept=".json">

<script>
    let cur = 0, sel = null, arcFocus = null, dragEl = null;
    const STORAGE_KEY = 'analog_db';

    function getShortDate(dObj) { 
        return `${dObj.toLocaleDateString('en-US', { month: 'short' })} ${dObj.getDate()}, ${dObj.getFullYear()}`; 
    }

    let db = {
        today: JSON.parse(localStorage.getItem(STORAGE_KEY+'_t')) || Array(10).fill().map(()=>({t:"", s:0, c:0})),
        next: JSON.parse(localStorage.getItem(STORAGE_KEY+'_n')) || Array(10).fill().map(()=>({t:"", s:0, c:0})),
        someday: JSON.parse(localStorage.getItem(STORAGE_KEY+'_s')) || Array(10).fill().map(()=>({t:"", s:0, c:0})),
        archive: JSON.parse(localStorage.getItem(STORAGE_KEY+'_a')) || [],
        lastActiveDate: localStorage.getItem(STORAGE_KEY+'_lastDate') || getShortDate(new Date())
    };

    function save() { 
        localStorage.setItem(STORAGE_KEY+'_t', JSON.stringify(db.today)); 
        localStorage.setItem(STORAGE_KEY+'_n', JSON.stringify(db.next)); 
        localStorage.setItem(STORAGE_KEY+'_s', JSON.stringify(db.someday)); 
        localStorage.setItem(STORAGE_KEY+'_a', JSON.stringify(db.archive)); 
        localStorage.setItem(STORAGE_KEY+'_lastDate', db.lastActiveDate);
    }

    function checkDayReset() {
        const todayStr = getShortDate(new Date());
        if (db.lastActiveDate !== todayStr) { 
            fin(true); 
            db.lastActiveDate = todayStr;
            save();
        }
    }

    function render() {
        const views = ['today', 'next', 'someday', 'archive'];
        const v = views[cur];
        const el = document.getElementById('card');
        const todayShort = getShortDate(new Date());
        el.className = 'card ' + (arcFocus ? 'c-archive' : 'c-' + v);

        if(cur === 3 && !arcFocus) {
            const gear = `<svg class="settings-trigger" onclick="openSettings()" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>`;
            el.innerHTML = `<div class="hdr"><b>Archive</b>${gear}</div><div id="arch-list" style="overflow-y:auto; height:calc(100% - 100px)"></div>`;
            db.archive.slice().reverse().forEach((e, i) => {
                let realIdx = db.archive.length - 1 - i;
                let isToday = e.d === todayShort;
                let r = document.createElement('div'); r.className='arch-item';
                r.innerHTML = `
                    <div class="arch-date" onclick="viewArc(${realIdx})">${e.d}</div>
                    <div class="arch-ctrls">
                        ${isToday ? `
                        <div class="arch-btn arch-undo" onclick="undoFin(${realIdx})">
                            <svg viewBox="0 0 24 24" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                        </div>` : ''}
                        <div class="arch-btn arch-del" onclick="delArch(event, ${realIdx})">
                            <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </div>
                    </div>`;
                document.getElementById('arch-list').appendChild(r);
            });
            return;
        }

        const data = arcFocus ? arcFocus.tasks : db[v];
        const title = arcFocus ? 'History' : v.charAt(0).toUpperCase() + v.slice(1);
        let sub = arcFocus ? arcFocus.d : (cur === 0 ? todayShort : (cur === 1 ? "Priority" : "Ideas"));

        el.innerHTML = `<div class="hdr"><b>${title}</b><span>${sub}</span></div><ul id="list" class="${cur===0?'today-list':''}"></ul><div id="btn-container"></div>`;
        updateTodayButton();

        const list = document.getElementById('list');
        const arrowSVG = `<svg class="del-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="12" x2="17" y2="12"></line><polyline points="12 7 17 12 12 17"></polyline></svg>`;
        
        data.forEach((item, i) => {
            let li = document.createElement('li'); li.dataset.idx = i;
            let btnClass = "btn-c";
            if (item.s === 1) btnClass += " s-progress";
            if (item.s === 2) btnClass += " s-done";
            let icon = item.s === 3 ? arrowSVG : '';
            
            // Syntax Detection
            const tagMatch = item.t.match(/\[(\d+)\]/);
            const goal = tagMatch ? parseInt(tagMatch[1]) : 0;
            const cleanText = item.t.replace(/\[\d+\]/g, '').trim();
            const count = item.c || 0;
            
            let dotsHTML = '';
            if(goal > 0) {
                dotsHTML = `<div class="tally-hit-zone" onclick="cycleDots(${i})">`;
                for(let d=1; d<=goal; d++) {
                    dotsHTML += `<div class="dot ${d<=count?'active':''}"></div>`;
                }
                dotsHTML += '</div>';
            }

            li.innerHTML = `<div class="${btnClass}" onclick="tgl(${i})">${icon}</div>
                            <div class="inp-wrap">
                                <input type="text" value="${cleanText}" oninput="upd(${i},this.value)" class="${item.s==2?'done':''}">
                                ${dotsHTML}
                            </div>
                            <div class="ctrls"><span class="dots" onclick="openM(${i})">⋮</span><span class="hndl" onpointerdown="startDrag(event, ${i})">⠿</span></div>`;
            list.appendChild(li);
        });
    }

    function cycleDots(idx) {
        if(arcFocus) return;
        let v = ['today','next','someday'][cur];
        let item = db[v][idx];
        const match = item.t.match(/\[(\d+)\]/);
        const goal = match ? parseInt(match[1]) : 0;
        
        item.c = (item.c || 0) + 1;
        if(item.c > goal) item.c = 0;
        
        // Auto-status updates
        if(item.c === 0) {
            item.s = 0; // Empty
        } else if(item.c === goal) {
            item.s = 2; // Done
        } else {
            item.s = 1; // In Progress
        }
        
        save(); render();
    }

    function updateTodayButton() {
        const container = document.getElementById('btn-container');
        if(!container || cur !== 0 || arcFocus) { if(container) container.innerHTML = ""; return; }
        const hasTasks = db.today.some(x => x.t.trim() !== "");
        container.innerHTML = `<div style="padding:20px; text-align:center;"><button class="fin-btn" onclick="${hasTasks?'fin()':'viewLastArc()'}">${hasTasks?'Finish Day':'Review Yesterday'}</button></div>`;
    }

    function upd(i,v) { 
        if(arcFocus) return; 
        let key = ['today','next','someday'][cur];
        // Ensure we preserve the tag when editing text
        const tagMatch = db[key][i].t.match(/\[\d+\]/);
        const tag = tagMatch ? tagMatch[0] : "";
        db[key][i].t = tag ? `${v} ${tag}` : v;
        save(); 
        if(cur === 0) updateTodayButton(); 
    }

    function startDrag(e, i) { 
        if(arcFocus) return; 
        dragEl = e.target.closest('li'); 
        dragEl.classList.add('dragging');
        dragEl.setPointerCapture(e.pointerId); 
    }
    
    document.addEventListener('pointermove', e => {
        if(!dragEl) return;
        const list = document.getElementById('list');
        const items = [...list.querySelectorAll('li:not(.dragging)')];
        let next = items.find(s => e.clientY <= s.getBoundingClientRect().top + s.offsetHeight/2);
        if (next) list.insertBefore(dragEl, next);
        else list.appendChild(dragEl);
    });

    document.addEventListener('pointerup', e => {
        if(!dragEl) return;
        dragEl.classList.remove('dragging');
        let v = ['today','next','someday','archive'][cur];
        db[v] = [...document.querySelectorAll('#list li')].map(li => db[v][li.dataset.idx]);
        dragEl = null; save(); render();
    });

    function tgl(i) { 
        if(arcFocus) return; 
        let v = ['today','next','someday','archive'][cur];
        let item = db[v][i];
        item.s = (item.s + 1) % 4; 
        
        // Sync dots to status if applicable
        const tagMatch = item.t.match(/\[(\d+)\]/);
        if(tagMatch) {
            const goal = parseInt(tagMatch[1]);
            if(item.s === 2) item.c = goal;
            else if(item.s === 0) item.c = 0;
            else if(item.s === 1 && item.c === 0) item.c = 1;
        }
        
        save(); render(); 
    }

    function viewArc(i) { arcFocus = { tasks: db.archive[i].tasks, d: db.archive[i].d, idx: i }; render(); }
    function delArch(e, i) { e.stopPropagation(); if(confirm("Delete card?")) { db.archive.splice(i, 1); save(); render(); } }
    function viewLastArc() { if(db.archive.length > 0) viewArc(db.archive.length - 1); else alert("No history"); }

    function openM(i) { 
        sel=i; const container = document.getElementById('m-options-container'); container.innerHTML = '';
        const addOption = (label, action) => {
            const div = document.createElement('div'); div.className = 'm-item'; div.innerText = label; div.onclick = () => mAct(action);
            container.appendChild(div);
        };
        if(arcFocus) {
            addOption("Migrate to Today", "today"); addOption("Migrate to Next", "next");
        } else {
            const v = ['today', 'next', 'someday'][cur];
            if(v !== 'today') addOption("Move to Today", "today");
            if(v !== 'next') addOption("Move to Next", "next");
            if(v !== 'someday') addOption("Move to Someday", "someday");
            addOption("Delete Task", "del");
        }
        document.getElementById('menu').classList.add('open'); document.getElementById('ov').style.display='block'; 
    }

    function mAct(a) { 
        let src = arcFocus ? arcFocus.tasks : db[['today', 'next', 'someday'][cur]];
        if (a === 'del') { src[sel] = {t:"", s:0, c:0}; } 
        else {
            let ti = db[a].findIndex(x => x.t.trim() === "");
            let newTask = JSON.parse(JSON.stringify(src[sel]));
            if(ti !== -1) db[a][ti] = newTask; else db[a].push(newTask);
            if(arcFocus) src[sel].s = 3; else src[sel] = {t:"", s:0, c:0};
        }
        save(); render(); closeAll();
    }

    function fin(isAuto = false) { 
        if(!isAuto && !confirm("Archive today?")) return; 
        const todayStr = getShortDate(new Date());
        db.archive.push({d: todayStr, tasks: JSON.parse(JSON.stringify(db.today))}); 
        const migrated = db.today.filter(t => (t.s === 1 || t.s === 3) && t.t.trim() !== "");
        db.today = Array(10).fill().map(()=>({t:"", s:0, c:0}));
        migrated.forEach((t, i) => { if(i < 10) db.today[i] = JSON.parse(JSON.stringify(t)); });
        db.lastActiveDate = todayStr;
        save(); if(!isAuto) render(); 
    }

    function undoFin(idx) {
        if(!confirm("Restore this card to Today? (Tasks will merge with your current Today card)")) return;
        let archivedCard = db.archive.splice(idx, 1)[0];
        let archivedTasks = archivedCard.tasks.filter(t => t.t.trim() !== "");
        archivedTasks.forEach(task => {
            let emptyIdx = db.today.findIndex(t => t.t.trim() === "");
            if (emptyIdx !== -1) {
                db.today[emptyIdx] = task;
            } else {
                db.today.push(task);
            }
        });
        arcFocus = null;
        cur = 0; 
        save(); render();
    }

    function openSettings() { document.getElementById('settings-menu').classList.add('open'); document.getElementById('ov').style.display='block'; }
    function closeAll() { document.getElementById('menu').classList.remove('open'); document.getElementById('settings-menu').classList.remove('open'); document.getElementById('ov').style.display='none'; }
    function exportData() { const a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db)); a.download = "analog_backup.json"; a.click(); }
    
    function exportMarkdown() {
        const now = new Date();
        const exportDate = `${now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })} at ${now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}`;
        let md = "---\ntitle: Analog Digital OS Archive\n";
        md += `export_date: "${exportDate}"\n---\n\n# Archive History\n\n`;
        db.archive.slice().reverse().forEach(day => {
            md += `## ${day.d}\n`;
            day.tasks.forEach(t => {
                if(t.t.trim() !== "") {
                    let prefix = "[ ]";
                    if(t.s === 1) prefix = "[/]"; 
                    if(t.s === 2) prefix = "[x]"; 
                    if(t.s === 3) prefix = "[>]"; 
                    let progress = t.c > 0 ? ` (Progress: ${t.c})` : '';
                    md += `${prefix} ${t.t}${progress}\n`;
                }
            });
            md += "\n";
        });
        const a = document.createElement('a'); a.href = "data:text/markdown;charset=utf-8," + encodeURIComponent(md); a.download = "analog_history.md"; a.click();
    }

    function importData() { document.getElementById('fileInput').click(); }
    document.getElementById('fileInput').onchange = e => { const reader = new FileReader(); reader.onload = ev => { db = JSON.parse(ev.target.result); save(); render(); closeAll(); }; reader.readAsText(e.target.files[0]); };

    function jump(dir) {
        let el = document.getElementById('card');
        el.style.transform = `translateX(${-dir * 100}%)`;
        setTimeout(() => {
            cur = (cur + dir + 4) % 4; arcFocus = null;
            el.style.transition = 'none';
            el.style.transform = `translateX(${dir * 100}%)`;
            render();
            setTimeout(() => {
                el.style.transition = 'transform 0.25s cubic-bezier(0.2, 1, 0.3, 1)';
                el.style.transform = 'translateX(0)';
            }, 15);
        }, 200);
    }

    let sX = 0;
    document.addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.addEventListener('touchend', e => {
        let diff = e.changedTouches[0].clientX - sX;
        if(Math.abs(diff) > 70 && !dragEl) { 
            if(arcFocus){ arcFocus=null; render(); return; } 
            jump(diff > 0 ? -1 : 1); 
        }
    });

    checkDayReset();
    render();
</script>
</body>
</html>
