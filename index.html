<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        :root { 
            --rule: rgba(0,0,0,0.12); --text: #1a1a1a; --priority: #991b1b; --line: 52px;
            --paper-today: #ffffff; --paper-next: #efdfb4; --paper-someday: #c7b399; --paper-ledger: #c7b399; 
        }
        body { 
            margin: 0; padding: 0; background: #1a1a1a; font-family: 'Nanum Pen Script', cursive; 
            overflow: hidden; height: 100vh; width: 100vw; -webkit-tap-highlight-color: transparent;
        }
        #vp { width: 100%; height: 100vh; position: relative; overflow: hidden; }
        .card { width: 100%; height: 100%; position: absolute; top: 0; left: 0; transition: transform 0.25s cubic-bezier(0.2, 1, 0.3, 1); box-sizing: border-box; }
        .c-today { background: var(--paper-today); }
        .c-next { background: var(--paper-next); }
        .c-someday { background: var(--paper-someday); }
        .c-ledger { background: var(--paper-ledger); }
        .hdr { height: 100px; display: flex; align-items: flex-start; justify-content: space-between; padding: 20px 20px 0 20px; box-sizing: border-box; }
        .hdr b { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #000; }
        .hdr span { font-size: 22px; color: rgba(0,0,0,0.5); text-align: right; padding-top: 2px; }
        ul { list-style: none; margin: 0; padding: 0; position: relative; }
        li { height: var(--line); display: flex; align-items: center; padding: 0 15px; position: relative; background: transparent; touch-action: none; box-sizing: border-box; }
        li::after { content: ""; position: absolute; bottom: 0; left: 48px; right: 15px; height: 1px; background-color: var(--rule); }
        li.dragging { opacity: 0.8; transform: scale(1.02); box-shadow: 0 5px 15px rgba(0,0,0,0.1); background: rgba(255,255,255,0.4); z-index: 100; }
        .btn-c { width: 18px; height: 18px; border: 1.2px solid #000; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 2; background: transparent; position: relative; overflow: hidden; }
        .today-list li:nth-child(-n+3) .btn-c { border-color: var(--priority); border-width: 2px; }
        .btn-c.s-progress { background: linear-gradient(90deg, #000 50%, transparent 50%); }
        .btn-c.s-done { background: #000; border-color: #000; }
        .del-arrow { width: 100%; height: 100%; color: inherit; }
        .inp-wrap { flex: 1; display: flex; align-items: center; min-width: 0; position: relative; height: 100%; }
        input { flex: 1; border: none; font-size: 24px; outline: none; background: transparent; color: var(--text); z-index: 2; font-family: 'Nanum Pen Script', cursive; min-width: 0; padding-top: 4px; }
        .done { text-decoration: line-through; color: rgba(0,0,0,0.45); opacity: 0.7; }
        .tally-hit-zone { display: grid; grid-template-rows: repeat(2, 1fr); grid-auto-flow: column; gap: 4px; height: 24px; padding: 0 8px 0 12px; cursor: pointer; z-index: 5; align-items: center; }
        .dot { width: 5px; height: 5px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); transition: all 0.1s; }
        .dot.active { background: #000; border-color: #000; transform: scale(1.1); }
        .ctrls { display: flex; align-items: center; gap: 8px; color: rgba(0,0,0,0.3); z-index: 2; flex-shrink: 0; font-family: sans-serif; }
        .dots, .hndl { padding: 5px; font-size: 18px; cursor: pointer; user-select: none; }
        .hndl { font-size: 20px; }
        .fin-btn { padding: 8px 18px; background: #fff; color: #000; border: 1px solid rgba(0,0,0,0.4); border-radius: 6px; font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 15px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; }
        #menu, #settings-menu { position: fixed; bottom: -100%; left: 0; width: 100%; background: #fff; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); border-radius: 24px 24px 0 0; transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1); z-index: 100; padding-bottom: 40px; font-family: 'Cormorant Garamond', serif; }
        #menu.open, #settings-menu.open { bottom: 0; }
        .m-item { padding: 20px; text-align: center; border-bottom: 1px solid #f5f5f5; color: #111; font-size: 20px; font-weight: 500; letter-spacing: 0.5px; cursor: pointer; }
        #ov { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: none; z-index: 90; }
        .ledger-item { padding: 12px 20px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; min-height: 64px; }
        .ledger-date { flex: 1; font-size: 28px; cursor: pointer; padding: 5px 0; }
        .ledger-ctrls { display: flex; align-items: center; gap: 4px; height: 44px; }
        .ledger-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; border-radius: 50%; border: none; background: transparent; }
        .ledger-undo { color: #000; opacity: 0.6; }
        .ledger-del { color: var(--priority); }
        .ledger-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; display: block; }
        .settings-trigger { width: 24px; height: 24px; fill: rgba(0,0,0,0.6); margin-top: 4px; cursor: pointer; }

        /* Feature 1: Month Stacks */
        .month-stack { border-bottom: 1px solid rgba(0,0,0,0.15); }
        .month-stack summary { list-style: none; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: rgba(0,0,0,0.55); user-select: none; }
        .month-stack summary::-webkit-details-marker { display: none; }
        .stack-count { font-family: sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; background: rgba(0,0,0,0.1); border-radius: 10px; padding: 2px 8px; }

        /* Feature 3: Backup Banner */
        #backup-banner { display: none; position: fixed; top: 0; left: 0; right: 0; background: #991b1b; color: #fff; font-family: sans-serif; font-size: 13px; font-weight: 600; padding: 10px 16px; z-index: 200; text-align: center; line-height: 1.4; }
        #backup-banner.visible { display: block; }
        #backup-banner button { margin-left: 12px; background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.5); color: #fff; border-radius: 4px; padding: 3px 10px; font-size: 12px; font-weight: 700; cursor: pointer; vertical-align: middle; }
        body.has-banner #vp { padding-top: 40px; height: calc(100vh - 40px); }
    </style>
</head>
<body>
    <div id="backup-banner">
        Backup overdue — last export was over 7 days ago.
        <button onclick="exportData()">Export Now</button>
    </div>

    <div id="vp"><div id="card" class="card"></div></div>
    <div id="ov" onclick="closeAll()"></div>
    <div id="menu">
        <div id="m-options-container"></div>
        <div class="m-item" style="opacity:0.5;" onclick="closeAll()">Cancel</div>
    </div>
    <div id="settings-menu">
        <div class="m-item" onclick="exportMarkdown()">Export Ledger (Markdown)</div>
        <div class="m-item" onclick="exportData()">Backup System (JSON)</div>
        <div class="m-item" onclick="importData()">Restore System (JSON)</div>
        <div class="m-item" style="opacity:0.5; font-weight:400;" onclick="closeAll()">Close</div>
    </div>
    <input type="file" id="fileInput" style="display:none" accept=".json">

<script>
    let cur = 0, sel = null, arcFocus = null, dragEl = null;
    const STORAGE_KEY = 'ledger_db';
    const OLD_KEY = 'analog_db';

    function getShortDate(dObj) { return `${dObj.toLocaleDateString('en-US', { month: 'short' })} ${dObj.getDate()}, ${dObj.getFullYear()}`; }

    function migrate() {
        const keys = ['_t', '_n', '_s', '_a', '_lastDate'];
        keys.forEach(k => {
            const oldData = localStorage.getItem(OLD_KEY + k);
            const newData = localStorage.getItem(STORAGE_KEY + k);
            if (oldData && !newData) localStorage.setItem(STORAGE_KEY + k, oldData);
        });
    }
    migrate();

    let db = {
        today: JSON.parse(localStorage.getItem(STORAGE_KEY+'_t')) || Array(10).fill().map(()=>({t:"", s:0, c:0})),
        next: JSON.parse(localStorage.getItem(STORAGE_KEY+'_n')) || Array(10).fill().map(()=>({t:"", s:0, c:0})),
        someday: JSON.parse(localStorage.getItem(STORAGE_KEY+'_s')) || Array(10).fill().map(()=>({t:"", s:0, c:0})),
        archive: JSON.parse(localStorage.getItem(STORAGE_KEY+'_a')) || [],
        lastActiveDate: localStorage.getItem(STORAGE_KEY+'_lastDate') || getShortDate(new Date())
    };

    function save() { 
        localStorage.setItem(STORAGE_KEY+'_t', JSON.stringify(db.today)); 
        localStorage.setItem(STORAGE_KEY+'_n', JSON.stringify(db.next)); 
        localStorage.setItem(STORAGE_KEY+'_s', JSON.stringify(db.someday)); 
        localStorage.setItem(STORAGE_KEY+'_a', JSON.stringify(db.archive)); 
        localStorage.setItem(STORAGE_KEY+'_lastDate', db.lastActiveDate);
    }

    function checkDayReset() {
        const todayStr = getShortDate(new Date());
        if (db.lastActiveDate !== todayStr) { 
            const dayToCommit = db.lastActiveDate;
            db.archive.push({ d: dayToCommit, tasks: JSON.parse(JSON.stringify(db.today)) });
            const migrated = db.today.filter(t => (t.s === 1 || t.s === 3) && t.t.trim() !== "");
            db.today = Array(10).fill().map(()=>({t:"", s:0, c:0}));
            migrated.forEach((t, i) => { if(i < 10) db.today[i] = JSON.parse(JSON.stringify(t)); });
            db.lastActiveDate = todayStr;
            save();
        }
    }

    // Feature 1: group archive by month
    function groupArchiveByMonth(archive) {
        const groups = {};
        const order = [];
        archive.forEach((entry, realIdx) => {
            const parsed = new Date(entry.d);
            const key = parsed.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            if (!groups[key]) { groups[key] = []; order.push(key); }
            groups[key].push({ entry, realIdx });
        });
        return { groups, order };
    }

    function getCurrentMonthKey() {
        return new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    function render() {
        const views = ['today', 'next', 'someday', 'ledger'];
        const v = views[cur];
        const el = document.getElementById('card');
        const todayShort = getShortDate(new Date());
        el.className = 'card ' + (arcFocus ? 'c-ledger' : 'c-' + (v==='ledger'?'ledger':v));

        if(cur === 3 && !arcFocus) {
            const gear = `<svg class="settings-trigger" onclick="openSettings()" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>`;
            el.innerHTML = `<div class="hdr"><b>Ledger</b>${gear}</div><div id="ledger-list" style="overflow-y:auto; height:calc(100% - 100px); padding-bottom:40px; box-sizing:border-box;"></div>`;
            const listEl = document.getElementById('ledger-list');

            if (db.archive.length === 0) {
                listEl.innerHTML = `<div style="padding:40px 20px; text-align:center; font-family:'Cormorant Garamond',serif; font-size:18px; color:rgba(0,0,0,0.35); letter-spacing:1px;">No entries yet.</div>`;
                return;
            }

            const { groups, order } = groupArchiveByMonth(db.archive);
            const currentMonthKey = getCurrentMonthKey();

            [...order].reverse().forEach(monthKey => {
                const entries = groups[monthKey];
                const isCurrentMonth = (monthKey === currentMonthKey);
                const details = document.createElement('details');
                details.className = 'month-stack';
                if (isCurrentMonth) details.open = true;

                const summary = document.createElement('summary');
                summary.innerHTML = `<span>${monthKey}</span><span class="stack-count">${entries.length} day${entries.length !== 1 ? 's' : ''}</span>`;
                details.appendChild(summary);

                [...entries].reverse().forEach(({ entry, realIdx }) => {
                    const r = document.createElement('div');
                    r.className = 'ledger-item';
                    r.innerHTML = `<div class="ledger-date" onclick="viewArc(${realIdx})">${entry.d}</div><div class="ledger-ctrls"><div class="ledger-btn ledger-undo" onclick="undoFin(${realIdx})"><svg viewBox="0 0 24 24" stroke="black" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg></div><div class="ledger-btn ledger-del" onclick="delArch(event, ${realIdx})"><svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke="red"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div></div>`;
                    details.appendChild(r);
                });
                listEl.appendChild(details);
            });
            return;
        }

        const data = arcFocus ? arcFocus.tasks : db[v];
        const title = arcFocus ? 'Historical' : v.charAt(0).toUpperCase() + v.slice(1);
        let sub = arcFocus ? arcFocus.d : (cur === 0 ? todayShort : (cur === 1 ? "Priority" : "Ideas"));

        el.innerHTML = `<div class="hdr"><b>${title}</b><span>${sub}</span></div><ul id="list" class="${cur===0?'today-list':''}"></ul><div id="btn-container"></div>`;
        updateTodayButton();

        const list = document.getElementById('list');
        const arrowSVG = `<svg class="del-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="12" x2="17" y2="12"></line><polyline points="12 7 17 12 12 17"></polyline></svg>`;
        
        data.forEach((item, i) => {
            let li = document.createElement('li'); li.dataset.idx = i;
            let btnClass = "btn-c";
            if (item.s === 1) btnClass += " s-progress";
            if (item.s === 2) btnClass += " s-done";
            let icon = item.s === 3 ? arrowSVG : '';
            const tagMatch = item.t.match(/\((\d+)\)/);
            const goal = tagMatch ? parseInt(tagMatch[1]) : 0;
            const cleanText = item.t.replace(/\(\d+\)/g, '').trim();
            const count = item.c || 0;
            let dotsHTML = '';
            if(goal > 0) {
                dotsHTML = `<div class="tally-hit-zone" onclick="cycleDots(${i})">`;
                for(let d=1; d<=goal; d++) dotsHTML += `<div class="dot ${d<=count?'active':''}"></div>`;
                dotsHTML += '</div>';
            }
            li.innerHTML = `<div class="${btnClass}" onclick="tgl(${i})">${icon}</div><div class="inp-wrap"><input type="text" value="${cleanText}" oninput="upd(${i},this.value)" class="${item.s==2?'done':''}" ${arcFocus?'readonly':''}>${dotsHTML}</div><div class="ctrls"><span class="dots" onclick="openM(${i})">⋮</span><span class="hndl" onpointerdown="startDrag(event, ${i})">⠿</span></div>`;
            list.appendChild(li);
        });
    }

    function cycleDots(idx) { if(arcFocus) return; let v = ['today','next','someday'][cur]; let item = db[v][idx]; const match = item.t.match(/\((\d+)\)/); const goal = match ? parseInt(match[1]) : 0; item.c = (item.c || 0) + 1; if(item.c > goal) item.c = 0; if(item.c === 0) item.s = 0; else if(item.c === goal) item.s = 2; else item.s = 1; save(); render(); }
    
    function updateTodayButton() { 
        const container = document.getElementById('btn-container'); 
        if(!container || cur !== 0 || arcFocus) { if(container) container.innerHTML = ""; return; } 
        const hasTasks = db.today.some(x => x.t.trim() !== ""); 
        container.innerHTML = `<div style="padding:20px; text-align:center;"><button class="fin-btn" onclick="${hasTasks?'fin()':'viewLastArc()'}">${hasTasks?'Commit Day':'Review Ledger'}</button></div>`; 
    }

    function upd(i,v) { if(arcFocus) return; let key = ['today','next','someday'][cur]; const tagMatch = db[key][i].t.match(/\(\d+\)/); const tag = tagMatch ? tagMatch[0] : ""; db[key][i].t = tag ? `${v} ${tag}` : v; save(); if(cur === 0) updateTodayButton(); }
    function startDrag(e, i) { if(arcFocus) return; dragEl = e.target.closest('li'); dragEl.classList.add('dragging'); dragEl.setPointerCapture(e.pointerId); }
    document.addEventListener('pointermove', e => { if(!dragEl) return; const list = document.getElementById('list'); const items = [...list.querySelectorAll('li:not(.dragging)')]; let next = items.find(s => e.clientY <= s.getBoundingClientRect().top + s.offsetHeight/2); if (next) list.insertBefore(dragEl, next); else list.appendChild(dragEl); });
    document.addEventListener('pointerup', e => { if(!dragEl) return; dragEl.classList.remove('dragging'); let v = ['today','next','someday'][cur]; db[v] = [...document.querySelectorAll('#list li')].map(li => db[v][li.dataset.idx]); dragEl = null; save(); render(); });
    function tgl(i) { if(arcFocus) return; let v = ['today','next','someday'][cur]; let item = db[v][i]; item.s = (item.s + 1) % 4; const tagMatch = item.t.match(/\((\d+)\)/); if(tagMatch) { const goal = parseInt(tagMatch[1]); if(item.s === 2) item.c = goal; else if(item.s === 0) item.c = 0; else if(item.s === 1 && (item.c === 0 || item.c === goal)) item.c = 1; } save(); render(); }
    function viewArc(i) { arcFocus = { tasks: db.archive[i].tasks, d: db.archive[i].d, idx: i }; render(); }
    function delArch(e, i) { e.stopPropagation(); if(confirm("Delete this entry from the Ledger forever?")) { db.archive.splice(i, 1); save(); render(); } }
    function viewLastArc() { if(db.archive.length > 0) viewArc(db.archive.length - 1); else alert("No historical data found."); }

    // Feature 2: Share / Copy
    async function shareTask(text) {
        if (!text || !text.trim()) return;
        if (navigator.share) {
            try { await navigator.share({ text: text.trim() }); } catch(e) { /* cancelled */ }
        } else {
            try {
                await navigator.clipboard.writeText(text.trim());
                showToast('Copied to clipboard');
            } catch(e) { alert('Could not copy: ' + text); }
        }
        closeAll();
    }

    function showToast(msg) {
        let t = document.getElementById('toast');
        if (!t) {
            t = document.createElement('div');
            t.id = 'toast';
            t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;font-family:sans-serif;font-size:13px;padding:8px 18px;border-radius:20px;z-index:300;pointer-events:none;transition:opacity 0.3s;';
            document.body.appendChild(t);
        }
        t.textContent = msg;
        t.style.opacity = '1';
        clearTimeout(t._timer);
        t._timer = setTimeout(() => { t.style.opacity = '0'; }, 1800);
    }

    function openM(i) {
        sel = i;
        const container = document.getElementById('m-options-container');
        container.innerHTML = '';
        const addOption = (label, action) => {
            const div = document.createElement('div');
            div.className = 'm-item';
            div.innerText = label;
            div.onclick = () => mAct(action);
            container.appendChild(div);
        };
        if(arcFocus) {
            addOption("Restore to Today", "today");
            addOption("Move to Next", "next");
        } else {
            const v = ['today', 'next', 'someday'][cur];
            if(v !== 'today') addOption("Move to Today", "today");
            if(v !== 'next') addOption("Move to Next", "next");
            if(v !== 'someday') addOption("Move to Someday", "someday");
            addOption("Remove Entry", "del");
        }
        // Share/Copy option
        const src = arcFocus ? arcFocus.tasks : db[['today', 'next', 'someday'][cur]];
        const taskText = src[i] ? src[i].t.replace(/\(\d+\)/g, '').trim() : '';
        if (taskText) {
            const shareDiv = document.createElement('div');
            shareDiv.className = 'm-item';
            shareDiv.innerText = navigator.share ? 'Share Task' : 'Copy Task';
            shareDiv.onclick = () => shareTask(taskText);
            container.appendChild(shareDiv);
        }
        document.getElementById('menu').classList.add('open');
        document.getElementById('ov').style.display = 'block';
    }

    function mAct(a) { let src = arcFocus ? arcFocus.tasks : db[['today', 'next', 'someday'][cur]]; if (a === 'del') { src[sel] = {t:"", s:0, c:0}; } else { let ti = db[a].findIndex(x => x.t.trim() === ""); let newTask = JSON.parse(JSON.stringify(src[sel])); if(ti !== -1) db[a][ti] = newTask; else db[a].push(newTask); if(arcFocus) { src[sel].s = 3; } else { src[sel] = {t:"", s:0, c:0}; } } save(); render(); closeAll(); }
    function fin() { if(!confirm("Commit today to the Ledger? Unfinished tasks will migrate forward.")) return; const todayStr = getShortDate(new Date()); db.archive.push({d: todayStr, tasks: JSON.parse(JSON.stringify(db.today))}); const migrated = db.today.filter(t => (t.s === 1 || t.s === 3) && t.t.trim() !== ""); db.today = Array(10).fill().map(()=>({t:"", s:0, c:0})); migrated.forEach((t, i) => { if(i < 10) db.today[i] = JSON.parse(JSON.stringify(t)); }); save(); render(); }
    function undoFin(idx) { if(!confirm("Restore tasks from this Ledger entry?")) return; let card = db.archive[idx]; card.tasks.forEach(task => { if(task.t.trim() !== "") { let emptyIdx = db.today.findIndex(t => t.t.trim() === ""); if (emptyIdx !== -1) db.today[emptyIdx] = JSON.parse(JSON.stringify(task)); else db.today.push(JSON.parse(JSON.stringify(task))); } }); save(); cur = 0; arcFocus = null; render(); }
    function openSettings() { document.getElementById('settings-menu').classList.add('open'); document.getElementById('ov').style.display='block'; }
    function closeAll() { document.getElementById('menu').classList.remove('open'); document.getElementById('settings-menu').classList.remove('open'); document.getElementById('ov').style.display='none'; }

    // Feature 3: Backup tracking
    function checkBackupStatus() {
        const lastBackup = localStorage.getItem(STORAGE_KEY + '_lastBackup');
        if (!lastBackup) {
            localStorage.setItem(STORAGE_KEY + '_lastBackup', Date.now().toString());
            return;
        }
        const daysSince = (Date.now() - parseInt(lastBackup)) / (1000 * 60 * 60 * 24);
        if (daysSince > 7) {
            document.getElementById('backup-banner').classList.add('visible');
            document.body.classList.add('has-banner');
        }
    }

    function dismissBanner() {
        document.getElementById('backup-banner').classList.remove('visible');
        document.body.classList.remove('has-banner');
    }

    function exportData() {
        const a = document.createElement('a');
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
        a.download = "ledger_backup.json";
        a.click();
        localStorage.setItem(STORAGE_KEY + '_lastBackup', Date.now().toString());
        dismissBanner();
        closeAll();
    }

    function exportMarkdown() { let md = "# Ledger\n\n"; db.archive.slice().reverse().forEach(day => { md += `## ${day.d}\n`; day.tasks.filter(t=>t.t.trim()!=="").forEach(t => { let p = t.s===2 ? "[x]" : (t.s===3 ? "[>]" : "[ ]"); md += `${p} ${t.t}\n`; }); md += "\n"; }); const a = document.createElement('a'); a.href = "data:text/markdown;charset=utf-8," + encodeURIComponent(md); a.download = "ledger_history.md"; a.click(); closeAll(); }
    function importData() { document.getElementById('fileInput').click(); }
    document.getElementById('fileInput').onchange = e => { const reader = new FileReader(); reader.onload = ev => { db = JSON.parse(ev.target.result); save(); render(); closeAll(); }; reader.readAsText(e.target.files[0]); };
    function jump(dir) { let el = document.getElementById('card'); el.style.transform = `translateX(${-dir * 100}%)`; setTimeout(() => { cur = (cur + dir + 4) % 4; arcFocus = null; el.style.transition = 'none'; el.style.transform = `translateX(${dir * 100}%)`; render(); setTimeout(() => { el.style.transition = 'transform 0.25s cubic-bezier(0.2, 1, 0.3, 1)'; el.style.transform = 'translateX(0)'; }, 15); }, 200); }
    let sX = 0;
    document.addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.addEventListener('touchend', e => { let diff = e.changedTouches[0].clientX - sX; if(Math.abs(diff) > 70 && !dragEl) { if(arcFocus){ arcFocus=null; render(); return; } jump(diff > 0 ? -1 : 1); } });

    checkDayReset();
    checkBackupStatus();
    render();
</script>
</body>
</html>
